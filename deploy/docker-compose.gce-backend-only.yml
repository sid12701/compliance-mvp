services:
  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    image: ckyc-backend:latest
    restart: unless-stopped
    env_file:
      - ../backend/.env.production
    environment:
      NODE_ENV: production
      PORT: 8080
      WORKERS_ENABLED: "true"
      PYTHON_SCRIPT_PATH: /app/backend/python
    ports:
      - "127.0.0.1:8080:8080"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
    environment:
      API_DOMAIN: ${API_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
