services:
  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    image: ckyc-backend:latest
    restart: unless-stopped
    env_file:
      - ../backend/.env.production
    environment:
      NODE_ENV: production
      PORT: 8080
      WORKERS_ENABLED: "true"
      PYTHON_SCRIPT_PATH: /app/backend/python
      DATABASE_URL: postgresql://ckyc:${POSTGRES_PASSWORD}@postgres:5432/ckyc?sslmode=disable
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    ports:
      - "127.0.0.1:8080:8080"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ckyc
      POSTGRES_USER: ckyc
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - redis_data:/data

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
    environment:
      API_DOMAIN: ${API_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
